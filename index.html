/* ══════════════════════════════════════════════════════
   MARKUP CANVAS CONTROLLER
   Vanilla JS class — manages the <canvas> directly
   ══════════════════════════════════════════════════════ */
class MC {
  constructor(cv) {
    this.cv=cv; this.x=cv.getContext('2d');
    this.img=null; this.items=[]; this.ftypes=[]; this.logo=null;
    this.sel=null; this.tool='select'; this.fixType=null;
    this.drag=false; this.ds=null; this.arrowStart=null;
    this.bright=1; this.arrowCol='#ff0000';
    this.defA=60; this.defL=150; this.defO=0.3;
    this.zoom=1; this.px=0; this.py=0;
    this.onSel=null;
    this._bind();
  }
  _bind() {
    const c=this.cv;
    c.addEventListener('click',      e=>this._click(e));
    c.addEventListener('mousedown',  e=>this._down(e));
    c.addEventListener('mousemove',  e=>this._move(e));
    c.addEventListener('mouseup',    ()=>this._up());
    c.addEventListener('dblclick',   e=>this._dbl(e));
    c.addEventListener('touchstart', e=>this._ts(e),{passive:false});
    c.addEventListener('touchmove',  e=>this._tm(e),{passive:false});
    c.addEventListener('touchend',   e=>this._te(e),{passive:false});
  }
  _xy(e) {
    const r=this.cv.getBoundingClientRect();
    const cx='touches'in e?e.touches[0].clientX:e.clientX;
    const cy='touches'in e?e.touches[0].clientY:e.clientY;
    const sx=this.cv.width/r.width, sy=this.cv.height/r.height;
    return{ x:(cx-r.left)*sx/this.zoom - this.px/this.zoom,
            y:(cy-r.top)*sy/this.zoom  - this.py/this.zoom };
  }
  _click(e) {
    const{x,y}=this._xy(e);
    if(this.fixType) {
      this.items.push({type:'fixture',id:uid(),ft:this.fixType,x,y,rot:this.fixType.defRot||0,ca:this.defA,cl:this.defL,co:this.defO});
      this.draw(); return;
    }
    if(this.tool==='logo'&&this.logo) {
      const ar=this.logo.height/this.logo.width;
      this.items.push({type:'logo',id:uid(),img:this.logo,x:x-100,y:y-50,w:200,h:200*ar});
      this.draw(); return;
    }
    if(this.tool==='text') {
      const t=prompt('Enter label:','Existing tree');
      if(t){this.items.push({type:'text',id:uid(),text:t,x,y,fs:22,col:'#ffff00',bg:'rgba(0,0,0,0.7)'});this.draw();}
      return;
    }
    if(this.tool==='arrow'&&!this.arrowStart){this.arrowStart={x,y};return;}
    if(this.tool==='arrow'&&this.arrowStart) {
      this.items.push({type:'arrow',id:uid(),sx:this.arrowStart.x,sy:this.arrowStart.y,ex:x,ey:y,col:this.arrowCol,thick:3});
      this.arrowStart=null; this.draw();
    }
  }
  _down(e) {
    const{x,y}=this._xy(e);
    if(this.tool!=='select')return;
    const fi=this.sel;
    if(fi?.type==='fixture') {
      const hr=Math.max(18,24/this.zoom); // hit radius, bigger when zoomed out
      const a=fi.rot, ha=(fi.ca*Math.PI/180)/2;
      const dx=x-fi.x, dy=y-fi.y;
      const lx=dx*Math.cos(-a)-dy*Math.sin(-a), ly=dx*Math.sin(-a)+dy*Math.cos(-a);
      if(Math.hypot(lx-fi.cl,ly)<hr){this.drag='cl';this.ds={x,y};return;}
      const tx=fi.cl*Math.cos(-ha),ty=fi.cl*Math.sin(-ha);
      const bx=fi.cl*Math.cos(ha), by=fi.cl*Math.sin(ha);
      if(Math.hypot(lx-tx,ly-ty)<hr||Math.hypot(lx-bx,ly-by)<hr){this.drag='ca';this.ds={x,y};return;}
      const rhd=(fi.cl||this.defL)*0.5+28;
      const rhx=fi.x+rhd*Math.cos(fi.rot), rhy=fi.y+rhd*Math.sin(fi.rot);
      if(Math.hypot(x-rhx,y-rhy)<hr){this.drag='rot';return;}
    }
    if(fi?.type==='logo') {
      if(Math.hypot(x-(fi.x+fi.w),y-(fi.y+fi.h))<22){this.drag='resize';this.ds={x,y};return;}
    }
    this.sel=null;
    for(let i=this.items.length-1;i>=0;i--) {
      const it=this.items[i];
      if(it.type==='fixture'&&Math.hypot(x-it.x,y-it.y)<32){this.sel=it;break;}
      if(it.type==='logo'&&x>=it.x&&x<=it.x+it.w&&y>=it.y&&y<=it.y+it.h){this.sel=it;break;}
      if(it.type==='text'){this.x.font=`${it.fs}px Arial`;const m=this.x.measureText(it.text);if(x>=it.x-8&&x<=it.x+m.width+8&&y>=it.y-it.fs-8&&y<=it.y+8){this.sel=it;break;}}
      if(it.type==='arrow'&&this._pld(x,y,it.sx,it.sy,it.ex,it.ey)<12){this.sel=it;break;}
    }
    if(this.sel){this.drag='move';this.ds={x,y};}
    this.draw(); if(this.onSel)this.onSel(this.sel);
  }
  _move(e) {
    if(!this.drag||!this.sel)return;
    const{x,y}=this._xy(e), fi=this.sel;
    if(this.drag==='cl'&&fi.type==='fixture'){
      const dx=x-fi.x,dy=y-fi.y,a=fi.rot;
      fi.cl=Math.max(50,Math.min(1000,dx*Math.cos(-a)-dy*Math.sin(-a)));
    } else if(this.drag==='ca'&&fi.type==='fixture'){
      const dx=x-fi.x,dy=y-fi.y,a=fi.rot;
      const lx=dx*Math.cos(-a)-dy*Math.sin(-a), ly=dx*Math.sin(-a)+dy*Math.cos(-a);
      fi.ca=Math.max(10,Math.min(120,Math.round(Math.abs(Math.atan2(ly,lx))*2*180/Math.PI)));
    } else if(this.drag==='move'){
      if(fi.type==='fixture'){fi.x+=x-this.ds.x;fi.y+=y-this.ds.y;this.ds={x,y};}
      else if(fi.type==='logo'){fi.x+=x-this.ds.x;fi.y+=y-this.ds.y;this.ds={x,y};}
      else if(fi.type==='text'){fi.x+=x-this.ds.x;fi.y+=y-this.ds.y;this.ds={x,y};}
      else if(fi.type==='arrow'){fi.sx+=x-this.ds.x;fi.sy+=y-this.ds.y;fi.ex+=x-this.ds.x;fi.ey+=y-this.ds.y;this.ds={x,y};}
    } else if(this.drag==='rot'&&fi.type==='fixture'){
      fi.rot=Math.atan2(y-fi.y,x-fi.x);

/* ══════════════════════════════════════════════════════
   MARKUP MODAL COMPONENT
   ══════════════════════════════════════════════════════ */
function MarkupModal({areaId,areaName,markup,onSave,onClose,ftypes,logoImg,onLibUpdate,estId,clientInfo,areaItems,areaNotes}){
  const cvRef=useRef(null), ctlRef=useRef(null);
  const[sel,setSel]=useState(null);
  const[activeTool,setActiveTool]=useState('select');
  const[activeFT,setActiveFT]=useState(null);
  const[arrowCol,setArrowCol]=useState('#ff0000');
  const[bright,setBright]=useState(100);
  const[defA,setDefA]=useState(60);
  const[defL,setDefL]=useState(150);
  const[defO,setDefO]=useState(30);
  const[hasPhoto,setHasPhoto]=useState(false);
  const[saving,setSaving]=useState(false);
  const[exportMode,setExportMode]=useState('photo'); // 'photo' | 'proposal'
  const[proposalNotes,setProposalNotes]=useState(markup?.proposalNotes||'');
  const[aiRendering,setAiRendering]=useState(null); // data url of AI result
  const[aiLoading,setAiLoading]=useState(false);
  const[aiError,setAiError]=useState(null);
  const[showAiModal,setShowAiModal]=useState(false);

  const buildProposalCanvas=async(markupDataUrl,_ci,_an,_ai,_ano,clientNotes)=>{
    const PW=1100,PH=850,SB=230,PAD=16,titleH=38;
    const oc=document.createElement('canvas');
    oc.width=PW;oc.height=PH;
    const c=oc.getContext('2d');
    // White bg
    c.fillStyle='#fff';c.fillRect(0,0,PW,PH);
    // Sidebar bg
    c.fillStyle='#f4f7fb';c.fillRect(0,0,SB,PH);
    c.strokeStyle='#0033cc';c.lineWidth=3;
    c.beginPath();c.moveTo(SB,0);c.lineTo(SB,PH);c.stroke();
    // Logo
    if(logoImg?.imgEl){
      const lw=174,lh=87,lx=(SB-lw)/2,ly=PAD;
      c.drawImage(logoImg.imgEl,lx,ly,lw,lh);
    } else {
      c.fillStyle='#0033cc';c.font='bold 14px Arial';c.textAlign='center';
      c.fillText('BOSTON OUTDOOR LIGHTING',SB/2,PAD+24);c.textAlign='left';
    }
    // Divider
    let sy=PAD+96;
    const div=()=>{c.strokeStyle='#c5d9ff';c.lineWidth=1;c.beginPath();c.moveTo(PAD,sy);c.lineTo(SB-PAD,sy);c.stroke();sy+=12;};
    div();
    // Client info
    c.fillStyle='#0033cc';c.font='bold 9px Arial';c.letterSpacing='1px';
    c.fillText('CLIENT INFORMATION',PAD,sy);c.letterSpacing='0px';sy+=13;
    c.fillStyle='#111';
    if(clientInfo?.jobName){c.font='bold 11px Arial';c.fillText(clientInfo.jobName,PAD,sy);sy+=14;}
    c.font='10px Arial';
    if(clientInfo?.clientName){c.fillText(clientInfo.clientName,PAD,sy);sy+=13;}
    if(clientInfo?.clientAddress){
      clientInfo.clientAddress.split(',').forEach(p=>{if(p.trim()&&sy<380){c.fillText(p.trim(),PAD,sy);sy+=13;}});
    }
    if(clientInfo?.clientEmail){c.fillStyle='#0033cc';c.fillText(clientInfo.clientEmail,PAD,sy);c.fillStyle='#111';sy+=13;}
    if(clientInfo?.clientPhone){c.fillText(clientInfo.clientPhone,PAD,sy);sy+=13;}
    c.fillStyle='#888';c.font='9px Arial';
    c.fillText(new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}),PAD,sy);sy+=16;
    div();
    // Fixture legend from placed items
    const counts={};
    (ctlRef.current?.items||[]).forEach(it=>{
      if(it.type==='fixture'&&it.ft?.name){
        if(!counts[it.ft.name])counts[it.ft.name]={ft:it.ft,n:0};
        counts[it.ft.name].n++;
      }
    });
    const legs=Object.values(counts);
    if(legs.length){
      c.fillStyle='#0033cc';c.font='bold 9px Arial';c.letterSpacing='1px';
      c.fillText('FIXTURE LEGEND',PAD,sy);c.letterSpacing='0px';sy+=11;
      const ICON=64, CARD_GAP=10, CARD_H=ICON+30;
      legs.forEach(({ft,n})=>{
        if(sy+CARD_H>PH-90)return;
        const cx=PAD, cy=sy;
        // Card bg
        c.fillStyle='#fff';
        c.strokeStyle='#c5d9ff';c.lineWidth=1;
        const cw=SB-PAD*2;

        c.beginPath();
        c.moveTo(cx+r6,cy);c.lineTo(cx+cw-r6,cy);c.arcTo(cx+cw,cy,cx+cw,cy+r6,r6);
        c.lineTo(cx+cw,cy+CARD_H-r6);c.arcTo(cx+cw,cy+CARD_H,cx+cw-r6,cy+CARD_H,r6);
        c.lineTo(cx+r6,cy+CARD_H);c.arcTo(cx,cy+CARD_H,cx,cy+CARD_H-r6,r6);

        if(ft.iconImg){
          try{c.drawImage(ft.iconImg,ix,iy,ICON,ICON);}catch(e){
            c.fillStyle='#e0e8ff';c.fillRect(ix,iy,ICON,ICON);
          }

          c.fillStyle='#e0e8ff';c.fillRect(ix,iy,ICON,ICON);
        }
        // Quantity badge top-right of icon
        c.fillStyle='#0033cc';
        c.beginPath();c.arc(ix+ICON+1,iy+4,13,0,Math.PI*2);c.fill();
        c.fillStyle='#fff';c.font='bold 12px Arial';c.textAlign='center';

        c.textAlign='left';
        sy+=CARD_H+CARD_GAP;
      });
      sy+=4;div();
    }
    // Area notes
    if(areaNotes?.trim()&&sy<PH-120){
      c.fillStyle='#0033cc';c.font='bold 9px Arial';c.fillText('SCOPE',PAD,sy);sy+=13;
      c.fillStyle='#333';c.font='9px Arial';
      const words=areaNotes.trim().split(' ');let line='';

    c.fillStyle='#999';c.font='8px Arial';c.fillText('97 Chestnut St, Wakefield MA',SB/2,PH-9);

      c.strokeRect(SB+4,notesY,PW-SB-8,notesH);
      c.fillStyle='#0033cc';c.font='bold 8px Arial';c.letterSpacing='1px';
      c.fillText('CLIENT NOTES',SB+PAD,notesY+11);c.letterSpacing='0px';

        if(c.measureText(t).width>nmaxW){

  useEffect(()=>{
    if(!cvRef.current)return;

    ctl.onSel=item=>setSel(item?{...item}:null);

    requestAnimationFrame(async()=>{
      const srcToDataUrl=async src=>{
        if(!src)return null;
        if(src.startsWith('data:'))return src;
        try{
          const resp=await fetch(src);

  const lastPt=useRef(null);

  const drawGrid=(ctx,w,h)=>{
    ctx.strokeStyle='#e8ecf4';ctx.lineWidth=1;
    for(let x=40;x<w;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
    for(let y=40;y<h;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
  };

  useEffect(()=>{
    // Double rAF to ensure flex layout has fully resolved
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      const cv=cvRef.current;
      const wrap=wrapRef.current;
      if(!cv||!wrap)return;
      const w=wrap.clientWidth||window.innerWidth;
      const h=wrap.clientHeight||window.innerHeight-60;
      cv.width=w;
      cv.height=h;
      const ctx=cv.getContext('2d');
      ctx.fillStyle='#ffffff';
      ctx.fillRect(0,0,w,h);
      drawGrid(ctx,w,h);
      if(initialDataUrl){
        const img=new Image();
        img.onload=()=>ctx.drawImage(img,0,0,w,h);
        img.src=initialDataUrl;
      }
    }));
  },[]);

  const getPos=(e,cv)=>{
    const r=cv.getBoundingClientRect();
    if(e.clientX!==undefined)return{x:e.clientX-r.left,y:e.clientY-r.top};
    if(e.touches&&e.touches.length)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};
    return{x:0,y:0};
  };

  const startDraw=e=>{
    e.preventDefault();
    const cv=cvRef.current;if(!cv)return;
    const p=getPos(e,cv);
    lastPt.current=p;
    setDrawing(true);
    // dot on tap
    const ctx=cv.getContext('2d');
    ctx.beginPath();
    if(tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.arc(p.x,p.y,penSize*2,0,Math.PI*2);ctx.fill();}
    else{ctx.globalCompositeOperation='source-over';ctx.fillStyle=penColor;ctx.arc(p.x,p.y,penSize/2,0,Math.PI*2);ctx.fill();}
  };

  const moveDraw=e=>{
    e.preventDefault();
    if(!drawing||!lastPt.current)return;
    const cv=cvRef.current;if(!cv)return;
    const p=getPos(e,cv);
    const ctx=cv.getContext('2d');
    ctx.beginPath();
    if(tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.lineWidth=penSize*4;}
    else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=penColor;ctx.lineWidth=penSize;}
    ctx.lineCap='round';ctx.lineJoin='round';
    ctx.moveTo(lastPt.current.x,lastPt.current.y);
    ctx.lineTo(p.x,p.y);
    ctx.stroke();
    lastPt.current=p;
  };

  const endDraw=e=>{e.preventDefault();setDrawing(false);lastPt.current=null;};

  const clearSheet=()=>{
    const cv=cvRef.current;if(!cv)return;
    const ctx=cv.getContext('2d');
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#ffffff';ctx.fillRect(0,0,cv.width,cv.height);
    drawGrid(ctx,cv.width,cv.height);
  };

  const SKETCH_COLORS=['#000000','#1a1a8c','#cc0000','#007700','#886600','#555555'];
  const SIZES=[2,4,8,14];

  return e("div",{style:{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:3000,background:"#1a1a2e",display:"flex",flexDirection:"column",overflow:"hidden"}},
    e("div",{style:{background:"#0033cc",padding:"8px 14px",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",flexShrink:0}},
      e("span",{style:{color:"#fff",fontWeight:"bold",fontSize:14,marginRight:4}},"✏️ Sketch — ",areaName),
      e("div",{style:{display:"flex",gap:4}},
        SKETCH_COLORS.map(col=>e("div",{key:col,onClick:()=>{setPenColor(col);setTool('pen');},style:{
          width:24,height:24,borderRadius:"50%",background:col,cursor:"pointer",
          border:penColor===col&&tool==='pen'?"3px solid #fff":"2px solid rgba(255,255,255,.3)"
        }}))
      ),
      e("div",{style:{display:"flex",gap:4,alignItems:"center"}},
        SIZES.map(s=>e("div",{key:s,onClick:()=>setPenSize(s),style:{
          width:s*2+8,height:s*2+8,borderRadius:"50%",background:"#fff",cursor:"pointer",
          opacity:penSize===s?1:0.4,border:penSize===s?"2px solid #fff":"none"
        }}))
      ),
      e("button",{onClick:()=>setTool('eraser'),style:{padding:"4px 10px",fontSize:11,fontWeight:600,borderRadius:5,border:"none",cursor:"pointer",background:tool==='eraser'?"#fff":"rgba(255,255,255,.2)",color:tool==='eraser'?"#0033cc":"#fff"}},"⬜ Eraser"),
      e("button",{onClick:clearSheet,style:{padding:"4px 10px",fontSize:11,fontWeight:600,borderRadius:5,border:"none",cursor:"pointer",background:"rgba(255,100,100,.4)",color:"#fff"}},"🗑 Clear"),
      e("div",{style:{marginLeft:"auto",display:"flex",gap:6}},
        e("button",{onClick:()=>onSave(cvRef.current.toDataURL('image/png')),style:{padding:"6px 14px",fontSize:12,fontWeight:700,borderRadius:5,border:"none",cursor:"pointer",background:"#34d399",color:"#fff"}},"✅ Save"),
        e("button",{onClick:onClose,style:{padding:"6px 12px",fontSize:12,fontWeight:700,borderRadius:5,border:"none",cursor:"pointer",background:"rgba(255,255,255,.2)",color:"#fff"}},"✕ Close")
      )
    ),
    e("div",{ref:wrapRef,style:{flex:1,overflow:"hidden",background:"#fff",position:"relative"}},
      e("canvas",{
        ref:cvRef,
        style:{touchAction:"none",cursor:tool==='eraser'?"cell":"crosshair",display:"block",position:"absolute",top:0,left:0},
        onPointerDown:startDraw,onPointerMove:moveDraw,onPointerUp:endDraw,onPointerLeave:endDraw,
        onMouseDown:startDraw,onMouseMove:moveDraw,onMouseUp:endDraw,onMouseLeave:endDraw,
        onTouchStart:startDraw,onTouchMove:moveDraw,onTouchEnd:endDraw
      })
    )
  );
}


/* ══════════════════════════════════════════════════════
   MAIN APP
   ══════════════════════════════════════════════════════ */
function App(){
  const stored=loadCat();
  const[products,setProducts]=useState(stored?.products||SEED_PRODUCTS);
  const[catMeta,setCatMeta]=useState(stored?.meta||{updatedAt:null,source:"Seed data"});
  const[areas,setAreas]=useState([{id:uid(),name:"Front Yard",items:[],accepted:true,notes:"",markups:[]}]);
  const[pMode,setPMode]=useState("margin");
  const[margin,setMargin]=useState(40);
  const[ppf,setPpf]=useState(300);
  const[labor,setLabor]=useState({});
  const[jobName,setJobName]=useState("");
  const[cName,setCName]=useState("");
  const[cAddr,setCAddr]=useState("");
  const[cEmail,setCEmail]=useState("");
  const[cPhone,setCPhone]=useState("");
  const[orderNotes,setOrderNotes]=useState("");
  const[tab,setTab]=useState("estimate");
  const[search,setSearch]=useState("");
  const[ddOpen,setDdOpen]=useState(false);
  const[addTo,setAddTo]=useState(null);
  const[importing,setImporting]=useState(false);
  const[impStatus,setImpStatus]=useState(null);
  const[impPreview,setImpPreview]=useState(null);
  const[showImp,setShowImp]=useState(false);
  const[showLoad,setShowLoad]=useState(false);
  const[savedEsts,setSavedEsts]=useState([]);
  const[loadingList,setLoadingList]=useState(false);
  const[estId,setEstId]=useState(uid());
  const[mkModal,setMkModal]=useState(null);
  const[sketchModal,setSketchModal]=useState(null); // {areaId, areaName, dataUrl}
  const[ftypes,setFtypes]=useState([]);
  const[logoImg,setLogoImg]=useState(null);
  const fileRef=useRef(null);

  /* Load fixture library from Firebase on mount */
  useEffect(()=>{
    const tryLoad=()=>{
      if(!window.FB){setTimeout(tryLoad,200);return;}
      window.FB.loadLibrary().then(async lib=>{
        if(lib.fixtureTypes?.length){
          const loaded=await Promise.all(lib.fixtureTypes.map(ft=>new Promise(res=>{
            const imgEl=new Image();imgEl.crossOrigin='anonymous';imgEl.src=ft.iconSrc||ft.icon||'';
            imgEl.onload=()=>res({name:ft.name,iconSrc:ft.iconSrc||ft.icon,iconImg:imgEl,defRot:ft.defaultRotation||0});
            imgEl.onerror=()=>res(null);
          })));
          setFtypes(loaded.filter(Boolean));
        }
        if(lib.logo){
          const imgEl=new Image();imgEl.crossOrigin='anonymous';imgEl.src=lib.logo;
          imgEl.onload=()=>setLogoImg({src:lib.logo,imgEl});
        }
      }).catch(()=>{});
    };
    tryLoad();
  },[]);

  useEffect(()=>{saveCat({products,meta:catMeta});},[products,catMeta]);
  useEffect(()=>{if(areas.length>0&&!addTo)setAddTo(areas[0].id);},[areas,addTo]);

  /* Product search */
  const filtered=useMemo(()=>{if(!search.trim())return products;const q=search.toLowerCase();return products.filter(p=>p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)||p.category.toLowerCase().includes(q));},[search,products]);
  const grouped=useMemo(()=>{const g={};filtered.forEach(p=>{if(!g[p.category])g[p.category]=[];g[p.category].push(p);});return g;},[filtered]);

  /* Area actions */
  const addArea=n=>{const id=uid();setAreas(p=>[...p,{id,name:n,items:[],accepted:true,notes:"",markups:[]}]);setAddTo(id);};
  const renameArea=(id,n)=>setAreas(p=>p.map(a=>a.id===id?{...a,name:n}:a));
  const updNotes=(id,n)=>setAreas(p=>p.map(a=>a.id===id?{...a,notes:n}:a));
  const removeArea=id=>{setAreas(p=>p.filter(a=>a.id!==id));if(addTo===id)setAddTo(areas.find(a=>a.id!==id)?.id||null);};
  const toggleAcc=id=>setAreas(p=>p.map(a=>a.id===id?{...a,accepted:!a.accepted}:a));
  const addToArea=(prod,aid)=>{setAreas(p=>p.map(a=>{if(a.id!==aid)return a;const ex=a.items.find(li=>li.id===prod.id);if(ex)return{...a,items:a.items.map(li=>li.id===prod.id?{...li,qty:li.qty+1}:li)};return{...a,items:[...a.items,{...prod,qty:1,lineId:uid()}]};}));setSearch("");setDdOpen(false);};
  const updQty=(aid,pid,v)=>{const n=parseInt(v,10);if(isNaN(n)||n<0)return;setAreas(p=>p.map(a=>{if(a.id!==aid)return a;if(n===0)return{...a,items:a.items.filter(li=>li.id!==pid)};return{...a,items:a.items.map(li=>li.id===pid?{...li,qty:n}:li)};}));};
  const remFromArea=(aid,pid)=>setAreas(p=>p.map(a=>a.id===aid?{...a,items:a.items.filter(li=>li.id!==pid)}:a));

  /* Pricing math */
  const accAreas=areas.filter(a=>a.accepted);
  const allItems=areas.flatMap(a=>a.items);
  const accItems=accAreas.flatMap(a=>a.items);
  const fixCnt=allItems.filter(li=>li.isFixture).reduce((s,li)=>s+li.qty,0);
  const accFix=accItems.filter(li=>li.isFixture).reduce((s,li)=>s+li.qty,0);
  const gMat=allItems.reduce((s,li)=>s+li.cost*li.qty,0);
  const gLab=Object.values(labor).reduce((s,v)=>s+Number(v||0),0);
  const gTot=gMat+gLab;
  let gSell,gProfit,effM,effPPF;
  if(pMode==="margin"){gSell=margin<100?gTot/(1-margin/100):0;gProfit=gSell-gTot;effM=margin;effPPF=fixCnt>0?gSell/fixCnt:0;}
  else{gSell=fixCnt*ppf;gProfit=gSell-gTot;effM=gTot>0?(gProfit/gSell)*100:0;effPPF=ppf;}
  const aMat=accItems.reduce((s,li)=>s+li.cost*li.qty,0);
  const aLab=accAreas.reduce((s,a)=>s+Number(labor[a.id]||0),0);
  const aTot=aMat+aLab;
  let aSell,aProfit;
  if(pMode==="margin"){aSell=margin<100?aTot/(1-margin/100):0;aProfit=aSell-aTot;}
  else{aSell=accFix*ppf;aProfit=aSell-aTot;}
  const orderItems=useMemo(()=>{const m={};accItems.forEach(li=>{if(m[li.sku])m[li.sku].qty+=li.qty;else m[li.sku]={...li};});return Object.values(m);},[accItems]);
  const today=new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});

  /* Firebase actions */
  const saveToFB=async()=>{
    if(!window.FB){alert('Firebase not ready');return;}
    // Deep-remove undefined/non-serializable values — Firestore rejects undefined fields
    const clean=v=>{
      if(v===null||v===undefined)return null;
      if(typeof v==='function'||typeof v==='symbol')return null;
      if(Array.isArray(v))return v.map(clean).filter(x=>x!==null||true); // keep nulls in arrays
      if(v instanceof HTMLImageElement||v instanceof Image)return null;
      if(typeof v==='object'){
        const o={};
        for(const[k,val]of Object.entries(v)){
          if(val===undefined||typeof val==='function'||val instanceof HTMLImageElement||val instanceof Image)continue;
          o[k]=clean(val);
        }
        return o;
      }
      return v;
    };
    const cleanedAreas=areas.map(a=>({
      ...clean(a),
      markups:(a.markups||[]).map(m=>{
        const{dataUrl:_drop,img:_img,iconImg:_icon,...rest}=m;
        return clean(rest);
      })
    }));
    return window.FB.saveEstimate(estId,clean({
      id:estId,jobName,clientName:cName,clientAddress:cAddr,clientEmail:cEmail,clientPhone:cPhone,
      areas:cleanedAreas,
      margin,pricePerFix:ppf,pricingMode:pMode,laborByArea:labor,orderNotes
    }));
  };
  const loadFromFB=async()=>{
    if(!window.FB){alert('Firebase not ready');return;}
    setLoadingList(true);
    const list=await window.FB.loadAllEstimates().catch(()=>[]);
    setSavedEsts(list||[]);setLoadingList(false);setShowLoad(true);
  };
  const applyEst=est=>{
    setEstId(est.id);setJobName(est.jobName||"");setCName(est.clientName||"");setCAddr(est.clientAddress||"");setCEmail(est.clientEmail||"");setCPhone(est.clientPhone||"");
    setAreas((est.areas||[]).map(a=>({...a,markups:a.markups||[]})));
    setMargin(est.margin||40);setPpf(est.pricePerFix||300);setPMode(est.pricingMode||"margin");
    setLabor(est.laborByArea||{});setOrderNotes(est.orderNotes||"");
    setShowLoad(false);
  };
  const delEst=async id=>{if(!confirm('Delete?'))return;await window.FB?.deleteEstimate(id).catch(()=>{});setSavedEsts(p=>p.filter(e=>e.id!==id));};
  const newEst=()=>{
    if(!confirm("Save current and start new?"))return;
    saveToFB();
    setEstId(uid());setJobName("");setCName("");setCAddr("");setCEmail("");setCPhone("");
    setAreas([{id:uid(),name:"Front Yard",items:[],accepted:true,notes:"",markups:[]}]);
    setMargin(40);setPpf(300);setPMode("margin");setLabor({});setOrderNotes("");
  };

  /* Download */
  const download=async()=>{
    let out=`ESTIMATE: ${jobName||'Untitled'}\n`;
    if(cName)out+=`CLIENT: ${cName}\n`;if(cAddr)out+=`ADDRESS: ${cAddr}\n`;if(cPhone)out+=`PHONE: ${cPhone}\n`;
    out+=`DATE: ${new Date().toLocaleDateString()}\n\n${'='.repeat(60)}\n\n`;
    areas.filter(a=>a.accepted).forEach(area=>{
      const mat=area.items.reduce((s,li)=>s+li.cost*li.qty,0);
      const lab=Number(labor[area.id]||0);
      const af=area.items.filter(li=>li.isFixture).reduce((s,li)=>s+li.qty,0);
      const sell=pMode==="margin"?(mat+lab)/(1-effM/100):af*effPPF;
      out+=`AREA: ${area.name}\n${'-'.repeat(60)}\n`;
      if(area.notes)out+=`Notes: ${area.notes}\n\n`;
      area.items.forEach(li=>{out+=`  (${li.qty}) ${li.name}  [${li.sku}]  ${fmt(li.cost)} ea\n`;});
      out+=`\nMaterials: ${fmt(mat)}\nLabor: ${fmt(lab)}\nArea Total: ${fmt(sell)}\n\n`;
    });
    out+=`${'='.repeat(60)}\nGRAND TOTAL: ${fmt(aSell)}\n\nMATERIALS TO ORDER:\n${'='.repeat(60)}\n\n`;
    Object.entries(orderItems.reduce((g,li)=>{if(!g[li.category])g[li.category]=[];g[li.category].push(li);return g;},{})).forEach(([cat,items])=>{out+=`${cat}:\n`;items.forEach(li=>{out+=`  ${li.sku} | ${li.name} | Qty: ${li.qty}\n`;});out+='\n';});
    dlBlob(new Blob([out],{type:'text/plain'}),(jobName||'estimate').replace(/[^a-z0-9]/gi,'_')+'.txt');
    await new Promise(r=>setTimeout(r,200));
    for(const area of areas){
      for(const mk of(area.markups||[])){
        if(!mk.dataUrl&&!mk.url)continue;
        const src=mk.dataUrl||mk.url;
        const safe=((jobName||'est')+'-'+area.name+'-'+(mk.name||'markup')).replace(/[^a-z0-9]/gi,'_');
        if(src.startsWith('data:')){dlBlob(datToBlob(src),safe+'.png');}
        else{try{const resp=await fetch(src);const blob=await resp.blob();dlBlob(blob,safe+'.png');}catch(e){}}
        await new Promise(r=>setTimeout(r,200));
      }
    }
  };

  /* PDF packages */
  const exportPkgs=()=>{
    const acc=areas.filter(a=>a.accepted);if(!acc.length){alert("No accepted areas.");return;}
    acc.forEach(area=>{
      const doc=new jsPDF();let y=20;
      doc.setFontSize(20);doc.setTextColor(0,51,204);doc.text(area.name.toUpperCase()+" LIGHTING PACKAGE",105,y,{align:'center'});y+=12;
      doc.setFontSize(10);doc.setTextColor(100,100,100);if(jobName||cName)doc.text([jobName,cName].filter(Boolean).join(' – '),105,y,{align:'center'});y+=8;doc.line(20,y,190,y);y+=10;
      doc.setFontSize(14);doc.setTextColor(0,51,204);doc.text("Package Contents:",20,y);y+=8;doc.setFontSize(10);doc.setTextColor(50,50,50);
      area.items.forEach(item=>{if(y>270){doc.addPage();y=20;}const lines=doc.splitTextToSize(`(${item.qty}) ${item.name}`,165);doc.setFont(undefined,'bold');doc.text(`(${item.qty})`,25,y);doc.setFont(undefined,'normal');doc.text(lines[0].replace(/^\(\d+\)\s*/,''),38,y);y+=6;for(let i=1;i<lines.length;i++){if(y>270){doc.addPage();y=20;}doc.text(lines[i],38,y);y+=6;}});
      if(area.notes?.trim()){y+=4;doc.setFontSize(14);doc.setTextColor(0,51,204);doc.text("Scope of Work:",20,y);y+=8;doc.setFontSize(10);doc.setTextColor(50,50,50);doc.splitTextToSize(area.notes,170).forEach(l=>{if(y>270){doc.addPage();y=20;}doc.text(l,25,y);y+=6;});}
      const mat=area.items.reduce((s,li)=>s+li.cost*li.qty,0);const lab=Number(labor[area.id]||0);const af=area.items.filter(li=>li.isFixture).reduce((s,li)=>s+li.qty,0);const sell=pMode==="margin"?(mat+lab)/(1-effM/100):af*effPPF;
      y+=4;doc.line(20,y,190,y);y+=8;doc.setFontSize(14);doc.setTextColor(0,51,204);doc.text("Package Pricing:",20,y);y+=8;doc.setFontSize(11);doc.setTextColor(50,50,50);doc.text("Materials:",25,y);doc.text(fmt(mat),190,y,{align:'right'});y+=7;if(lab>0){doc.text("Labor:",25,y);doc.text(fmt(lab),190,y,{align:'right'});y+=7;}doc.setFont(undefined,'bold');doc.setFontSize(13);doc.setTextColor(0,51,204);doc.text("Package Total:",25,y);doc.text(fmt(sell),190,y,{align:'right'});
      doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text("Boston Outdoor Lighting  |  97 Chestnut St, Wakefield MA",105,285,{align:'center'});
      doc.save(area.name.replace(/[^a-z0-9]/gi,'_')+"_Package.pdf");
    });
  };

  /* PDF price import */
  const handlePDF=async e=>{
    const file=e.target.files?.[0];if(!file)return;if(file.type!=="application/pdf"){setImpStatus({type:"error",msg:"Please upload PDF"});return;}
    setImporting(true);setImpStatus({type:"info",msg:`Reading "${file.name}"…`});setImpPreview(null);
    try{
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Failed"));r.readAsDataURL(file);});
      setImpStatus({type:"info",msg:"Extracting… ~15 sec"});
      const response=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:4000,messages:[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:base64}},{type:"text",text:`Parse SiteOne price list PDF. Return ONLY a JSON array.\nEach item: {"sku":"...","name":"...","cost":number,"category":"...","isFixture":boolean}\nUse Net Price column. isFixture=true for fixture lights only (not lamps, wire, transformers).`}]}]})});
      if(!response.ok)throw new Error(`API ${response.status}`);
      const data=await response.json();
      const raw=(data.content||[]).map(b=>b.text||"").join("").trim().replace(/^```json\s*/i,"").replace(/^```/,"").replace(/```\s*$/,"").trim();
      let parsed;try{parsed=JSON.parse(raw);}catch{throw new Error("Unexpected format");}
      if(!Array.isArray(parsed)||parsed.length===0){setImpStatus({type:"error",msg:"No products found"});setImporting(false);return;}
      const withIds=parsed.map((p,i)=>({...p,id:Date.now()+i,cost:Number(p.cost)||0,isFixture:!!p.isFixture}));
      setImpPreview({products:withIds,filename:file.name});
      setImpStatus({type:"success",msg:`Found ${withIds.length} products`});
    }catch(err){setImpStatus({type:"error",msg:err.message||"Error"});}
    finally{setImporting(false);if(fileRef.current)fileRef.current.value="";}
  };
  const applyImp=mode=>{
    if(!impPreview)return;
    const inc=impPreview.products;let final;
    if(mode==="replace"){final=inc;}
    else{const m=[...products];inc.forEach(np=>{const idx=m.findIndex(ep=>ep.sku.toLowerCase()===np.sku.toLowerCase());if(idx>=0)m[idx]={...m[idx],...np,id:m[idx].id};else m.push(np);});final=m;}
    setProducts(final);setCatMeta({updatedAt:new Date().toISOString(),source:impPreview.filename});
    setImpPreview(null);setImpStatus({type:"success",msg:"Catalog updated"});
  };

  /* Markup handlers */
  const openMk=(aid,mk)=>setMkModal({areaId:aid,markup:mk});
  const saveMk=(aid,mkId,result)=>{
    setAreas(p=>p.map(a=>{
      if(a.id!==aid)return a;
      const ex=a.markups||[];
      if(mkId)return{...a,markups:ex.map(m=>m.id===mkId?{...m,...result}:m)};
      return{...a,markups:[...ex,{name:`Markup ${ex.length+1}`,...result}]};
    }));

            areas.map(a=>e("button",{key:a.id,onClick:()=>toggleAcc(a.id),style:{background:a.accepted?"#0033cc":"#f0f0f0",color:a.accepted?"#fff":"#999",border:`1px solid ${a.accepted?"#0033cc":"#ddd"}`,borderRadius:14,padding:"4px 11px",fontSize:11,fontWeight:a.accepted?"600":"normal",cursor:"pointer"}},a.accepted&&"✓ ",a.name))
          )
        ),
        e("div",{style:{border:"1px solid #e0e8f0",borderRadius:9,overflow:"hidden",background:"#fff",boxShadow:"0 1px 3px rgba(0,51,204,.07)"}},
          e("div",{style:{background:"linear-gradient(90deg,#0033cc,#0055ff)",padding:"14px 18px",borderBottom:"2px solid #0022aa"}},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:9}},
              e("div",null,
                e("div",{style:{fontSize:15,color:"#fff",fontWeight:"bold",marginBottom:2}},"Materials Order List"),
                e("div",{style:{fontSize:11,color:"rgba(255,255,255,.9)"}},"Boston Outdoor Lighting · ",today),
                (jobName||cName)&&e("div",{style:{fontSize:11,color:"rgba(255,255,255,.95)",marginTop:2}},[jobName,cName].filter(Boolean).join(' · '))
              ),
              e("button",{onClick:()=>window.print(),style:{background:"#fff",color:"#0033cc",border:"none",borderRadius:5,padding:"8px 14px",fontSize:12,fontWeight:"600",cursor:"pointer"}},"🖨 Print")
            )
          ),
          orderItems.length===0?e("div",{style:{padding:"32px 18px",textAlign:"center",color:"#999"}},"No items in accepted areas"):
          e(React.Fragment,null,
            e("div",{style:{display:"grid",gridTemplateColumns:"32px 105px 1fr 60px",background:"#fafbfc",padding:"6px 16px",fontSize:9,color:"#0033cc",letterSpacing:1.5,textTransform:"uppercase",fontWeight:"600"}},
              e("div",null),e("div",null,"SKU"),e("div",null,"Description"),e("div",{style:{textAlign:"center"}},"Qty")
            ),
            Object.entries(orderItems.reduce((g,li)=>{if(!g[li.category])g[li.category]=[];g[li.category].push(li);return g;},{})).map(([cat,items])=>
              e("div",{key:cat},
                e("div",{style:{padding:"5px 16px",background:"#f0f4ff",fontSize:9,color:"#0033cc",letterSpacing:2,textTransform:"uppercase",borderTop:"1px solid #e0e8f0",fontWeight:"600"}},cat),
                items.map(li=>e("div",{key:li.sku,style:{display:"grid",gridTemplateColumns:"32px 105px 1fr 60px",padding:"9px 16px",alignItems:"center",borderBottom:"1px solid #f5f5f5"}},
                  e("div",{style:{fontSize:14,color:"#ddd"}},"☐"),
                  e("div",{style:{fontSize:10,color:"#666",fontFamily:"monospace",wordBreak:"break-all"}},li.sku),
                  e("div",{style:{fontSize:11,color:"#1a1a1a"}},li.name," ",li.isFixture&&e("span",{style:{fontSize:10,color:"#0033cc"}},"🔆")),
                  e("div",{style:{textAlign:"center"}},e("span",{style:{display:"inline-block",background:"#0033cc",color:"#fff",borderRadius:12,padding:"2px 8px",fontWeight:"bold",fontSize:11}},"×",li.qty))
                ))
              )
            ),
            e("div",{style:{borderTop:"2px solid #0033cc",background:"#f8f9ff",padding:"14px 18px"}},
              e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginBottom:11}},
                e("div",null,e("div",{style:{fontSize:9,color:"#0033cc",letterSpacing:1.5,textTransform:"uppercase"}},"Total SKUs"),e("div",{style:{fontSize:17,color:"#1a1a1a",fontWeight:"bold"}},orderItems.length)),
                e("div",null,e("div",{style:{fontSize:9,color:"#0033cc",letterSpacing:1.5,textTransform:"uppercase"}},"Total Units"),e("div",{style:{fontSize:17,color:"#1a1a1a",fontWeight:"bold"}},accItems.reduce((s,li)=>s+li.qty,0))),
                e("div",{style:{textAlign:"right"}},e("div",{style:{fontSize:9,color:"#0033cc",letterSpacing:1.5,textTransform:"uppercase"}},"Materials Total"),e("div",{style:{fontSize:21,color:"#0033cc",fontWeight:"bold"}},fmt(aMat)))
              ),
              e("div",{style:{marginBottom:10}},
                e("label",{style:{fontSize:10,color:"#0033cc",letterSpacing:1.5,textTransform:"uppercase",display:"block",marginBottom:4}},"Order Notes for Supplier"),
                e("textarea",{value:orderNotes,onChange:ev=>setOrderNotes(ev.target.value),placeholder:"Special instructions for SiteOne…",style:{...inp,width:"100%",minHeight:72,resize:"vertical",fontFamily:"inherit"}})
              ),
              e("div",{style:{padding:"8px 11px",background:"#fff",borderRadius:5,fontSize:10,color:"#666",fontStyle:"italic",border:"1px solid #e0e8f0"}},"📧 Boston Outdoor Lighting · 97 Chestnut St, Wakefield MA")
            )
          )
        )
      )

    ), /* end body div */

    /* ── LOAD MODAL ── */
    showLoad&&e("div",{className:"load-ov",onClick:()=>setShowLoad(false)},
      e("div",{onClick:ev=>ev.stopPropagation(),className:"load-box"},
        e("div",{className:"load-hdr"},
          e("span",{style:{fontSize:14,color:"#fff",fontWeight:"700"}},"📂 Load Saved Estimate"),
          e("button",{onClick:()=>setShowLoad(false),style:{background:"none",border:"none",color:"#fff",fontSize:18,cursor:"pointer"}},"✕")
        ),
        e("div",{style:{padding:16}},
          loadingList?e("div",{style:{textAlign:"center",padding:28,color:"#666"}},"Loading…"):
          savedEsts.length===0?e("div",{style:{textAlign:"center",padding:"28px 18px",color:"#999"}},"No saved estimates found"):
          savedEsts.map(est=>e("div",{key:est.id,className:"est-row"},
            e("div",{style:{flex:1}},
              e("div",{style:{fontSize:13,color:"#1a1a1a",fontWeight:"600",marginBottom:2}},est.jobName||"Untitled"),
              est.clientName&&e("div",{style:{fontSize:11,color:"#666",marginBottom:2}},est.clientName),
              e("div",{style:{fontSize:10,color:"#999"}},est.updatedAt?fmtD(est.updatedAt):""," · ",(est.areas||[]).length," areas")
            ),
            e("button",{onClick:()=>applyEst(est),style:{background:"#0033cc",color:"#fff",border:"none",borderRadius:5,padding:"6px 12px",fontSize:11,fontWeight:"600",cursor:"pointer"}},"Load"),
            e("button",{onClick:()=>delEst(est.id),style:{background:"none",border:"none",color:"#d9534f",cursor:"pointer",fontSize:15}},"🗑")
          ))
        )
      )
    ),

    /* ── MARKUP MODAL ── */
    sketchModal&&e(SketchModal,{
      key:sketchModal.areaId,
      areaName:sketchModal.areaName,
      initialDataUrl:sketchModal.dataUrl,
      onSave:dataUrl=>saveSketch(sketchModal.areaId,dataUrl),
      onClose:()=>setSketchModal(null)
    }),
    mkModal&&e(MarkupModal,{
      key:mkModal.areaId+(mkModal.markup?.id||'new'),
      areaId:mkModal.areaId,
      areaName:areas.find(a=>a.id===mkModal.areaId)?.name||"",
      markup:mkModal.markup,
      estId,
      ftypes,
      logoImg,
      clientInfo:{jobName,clientName:cName,clientAddress:cAddr,clientEmail:cEmail,clientPhone:cPhone},
      areaItems:areas.find(a=>a.id===mkModal.areaId)?.items||[],
      areaNotes:areas.find(a=>a.id===mkModal.areaId)?.notes||"",
      onLibUpdate:(newFtypes,newLogo)=>{setFtypes(newFtypes);setLogoImg(newLogo);},
      onSave:result=>saveMk(mkModal.areaId,mkModal.markup?.id||null,result),
      onClose:()=>setMkModal(null)
    })
  );
}

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
</body>
</html>
